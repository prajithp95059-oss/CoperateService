<!DOCTYPE html>

<title>Staff Dashboard - Stackly</title>
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="dashboard">
  <div class="sidebar">
    <h2>Staff Panel</h2>
    <ul>
      <li class="active">Dashboard</li>
      <li>Tasks</li>
      <li>Projects</li>
      <li>Profile</li>
